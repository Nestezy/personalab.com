<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - PersonaLab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header_wrapper">
            <nav class="header_nav">
                <img src="images/header.svg" alt="Logo">
                <ul class="header_list">
                    <li class="header_list-item">
                        <a class="header_list-link" href="index.html">Home</a>
                    </li>
                    <li class="header_list-item">
                        <a class="header_list-link" href="studio.html">Studio</a>
                    </li>
                    <li class="header_list-item">
                        <a class="header_list-link" href="profile.html">Profile</a>
                    </li>
                    <li class="header_list-item">
                        <a class="header_list-link" href="about.html">About</a>
                    </li>
                </ul>
            </nav>
        </div>  
    </header>

    <main>
        <section class="page-header">
            <div class="breadcrumbs">
                <a href="index.html">Home</a> / <a href="about.html">About</a> / <span>Contact</span>
            </div>
            
            <div class="page-title">
                <img src="images/contact-icon.svg" alt="" width="30">
                <h2>Зв'язок з розробником</h2>
            </div>
            
            <p class="page-description">Маєте пропозиції щодо нових зачісок чи очей для фоторобота? Напишіть нам!</p>
        </section>

        <hr>

        <section class="contact-form">
            <p><strong>E-mail для зв'язку:</strong> example@email.com</p>
            <br>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="userName">Ваше ім'я:</label><br>
                    <input type="text" id="userName" name="userName" placeholder="Введіть ім'я" required>
                </div>
                <br>
                <div class="form-group">
                    <label for="userMessage">Повідомлення:</label><br>
                    <textarea id="userMessage" name="userMessage" rows="4" placeholder="Напишіть тут свій відгук..." required></textarea>
                </div>
                <br>
                <button type="submit" class="btn-primary">Відправити повідомлення</button>
                <button type="reset" class="btn-secondary">Очистити форму</button>
            </form>
            
            <br><br>
            <a href="about.html">⬅ Назад до інформації про проєкт</a>
        </section>
    </main>

    <footer class="footer">
        <div class="footer_wrapper">
            <p>&copy; 2026 PersonaLab. Усі права захищено.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
